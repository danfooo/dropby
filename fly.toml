app = 'drop-by'
primary_region = 'fra'

[build]
  [build.args]
    VITE_GOOGLE_CLIENT_ID = "750398451662-qnfcr5cab59n6fq86dj54ibnsu69mj15.apps.googleusercontent.com"

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[[mounts]]
  source = 'drop_by_data'
  destination = '/app/server/data'
